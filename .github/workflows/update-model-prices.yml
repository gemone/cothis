name: update-model-prices

# Refreshes ``src/cothis/data/model_prices.json`` from litellm's canonical
# source. The bundled JSON is what ``cothis.model_metadata.resolve_max_tokens``
# reads at runtime to size ``max_tokens`` per model — keeping it current means
# new models resolve to their real output cap instead of the 8192 fallback.
#
# Runs weekly (Sun 09:00 UTC) and on manual dispatch via the Actions tab.
# ``peter-evans/create-pull-request`` opens one PR per change; if the JSON is
# unchanged since last run, no PR is created (idempotent — no PR spam).

on:
  schedule:
    # Sunday 09:00 UTC — quiet window, weekly cadence matches litellm's
    # release rhythm without flooding maintainers.
    - cron: "0 9 * * 0"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest model_prices JSON
        run: |
          curl -fsSL \
            -o src/cothis/data/model_prices.json \
            https://raw.githubusercontent.com/BerriAI/litellm/main/model_prices_and_context_window.json

      - name: Validate JSON
        run: python -c "import json; json.load(open('src/cothis/data/model_prices.json'))"

      - name: Open PR if changed
        uses: peter-evans/create-pull-request@v7
        with:
          branch: chore/refresh-model-prices
          commit-message: "chore(data): refresh bundled litellm model_prices.json"
          title: "chore(data): refresh bundled litellm model_prices.json"
          body: |
            Automated refresh of `src/cothis/data/model_prices.json` from
            [litellm's canonical source](https://github.com/BerriAI/litellm/blob/main/model_prices_and_context_window.json).

            Generated by the `update-model-prices` weekly workflow. No code
            change — this only affects the metadata `cothis.model_metadata`
            reads to resolve `max_tokens` per model.
          labels: |
            automated
          delete-branch: true
